name: Update SQLite Database

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  clean-and-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install required packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas Flask
          # sqlite3 is included with Python 3.11 standard library
          python -c "import sqlite3; print('sqlite3 ready:', sqlite3.sqlite_version)"

      - name: Run clean_and_merge script
        run: python clean_and_merge.py
